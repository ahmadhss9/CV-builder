<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📄 Professional CV Builder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="templates.css">
    <!-- html2canvas for downloading as image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>📄 Professional CV Builder</h1>
        <p>Create your CV in minutes - 10 stunning templates!</p>
    </header>

    <div class="container">
        <!-- LEFT: FORM SECTION -->
        <div class="form-section">
            <h2>✏️ Fill Your Details</h2>
            <form id="cvForm">
                <!-- Photo Upload -->
                <div class="form-group photo-group">
                    <label>📸 Profile Picture</label>
                    <div class="photo-upload">
                        <img id="photoPreview" src="https://via.placeholder.com/150x150/cccccc/666666?text=Photo" alt="Preview">
                        <input type="file" id="photo" accept="image/*">
                        <label for="photo" class="upload-btn">Choose Photo</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>💼 Job Title / Profession</label>
                    <input type="text" id="jobTitle" placeholder="Software Engineer" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>🎂 Age</label>
                        <input type="number" id="age" placeholder="28" min="16" max="100" required>
                    </div>
                    <div class="form-group">
                        <label>📞 Phone</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 8900" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="john@email.com" required>
                </div>

                <div class="form-group">
                    <label>🏠 Address</label>
                    <input type="text" id="address" placeholder="123 Main St, City, Country" required>
                </div>

                <div class="form-group">
                    <label>📝 About Me</label>
                    <textarea id="about" rows="4" placeholder="Write a short bio about yourself..." required></textarea>
                </div>

                <div class="form-group">
                    <label>💼 Work Experience</label>
                    <textarea id="experience" rows="5" placeholder="2020-2023: Senior Developer at Tech Corp&#10;2018-2020: Junior Developer at StartUp Inc"></textarea>
                </div>

                <div class="form-group">
                    <label>🎓 Education</label>
                    <textarea id="education" rows="3" placeholder="2014-2018: B.Sc. Computer Science, MIT"></textarea>
                </div>

                <div class="form-group">
                    <label>⭐ Skills (comma separated)</label>
                    <input type="text" id="skills" placeholder="JavaScript, Python, React, Node.js">
                </div>

                <div class="form-group">
                    <label>🌍 Languages (comma separated)</label>
                    <input type="text" id="languages" placeholder="English, Spanish, French">
                </div>

                <button type="button" id="generateBtn">✨ Generate CV</button>
            </form>
        </div>

        <!-- RIGHT: TEMPLATES & PREVIEW -->
        <div class="preview-section">
            <h2>🎨 Choose Template</h2>
            
            <!-- Template Selector -->
            <div class="template-selector">
                <button class="tpl-btn active" data-template="1">1. Modern Blue</button>
                <button class="tpl-btn" data-template="2">2. Classic Black</button>
                <button class="tpl-btn" data-template="3">3. Creative Purple</button>
                <button class="tpl-btn" data-template="4">4. Minimalist</button>
                <button class="tpl-btn" data-template="5">5. Corporate Green</button>
                <button class="tpl-btn" data-template="6">6. Elegant Dark</button>
                <button class="tpl-btn" data-template="7">7. Sidebar Style</button>
                <button class="tpl-btn" data-template="8">8. Pink Modern</button>
                <button class="tpl-btn" data-template="9">9. Tech Orange</button>
                <button class="tpl-btn" data-template="10">10. Professional</button>
            </div>

            <!-- Action Buttons -->
            <div class="actions">
                <button id="downloadBtn">⬇️ Download as PNG</button>
                <button id="printBtn">🖨️ Print CV</button>
            </div>

            <!-- CV Preview -->
            <div class="cv-preview-wrapper">
                <div id="cvPreview" class="cv-template template-1">
                    <!-- CV content will be generated here -->
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Made with ❤️ - Build your CV in minutes!</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
